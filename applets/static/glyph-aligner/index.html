<!DOCTYPE html><html lang="en"><head>
		<title>three.js webgl - multiple elements</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
	</head>
	<body ondrop="drop(event)" ondragover="allowDrop(event)">
		<canvas id="c"></canvas>

		<div id="content">
			<div id="info">ABR Glyph Aligner</div>
      <div id="forward">Forward Vec = (<input type="text" id="forward_vec_x" name="forward_vec_x" size="10" onchange="updateVec('fx')" readonly="">, <input type="text" id="forward_vec_y" name="forward_vec_y" size="10" onchange="updateVec('fy')" readonly="">, <input type="text" id="forward_vec_z" name="forward_vec_z" size="10" onchange="updateVec('fz')" readonly="">)</div>
      <div id="up">
        Up Vec = (<input type="text" id="up_vec_x" name="up_vec_x" size="10" onchange="updateVec('ux')" readonly="">, <input type="text" id="up_vec_y" name="up_vec_y" size="10" onchange="updateVec('uy')" readonly="">, <input type="text" id="up_vec_z" name="up_vec_z" size="10" onchange="updateVec('uz')" readonly="">)
        <button type="button" onmousedown="rotateAxisPos(); intervalId=setInterval(rotateAxisPos, 30);" onmouseup="clearInterval(intervalId)">Rotate +</button>
        <button type="button" onmousedown="rotateAxisNeg(); intervalId=setInterval(rotateAxisNeg, 30);" onmouseup="clearInterval(intervalId)">Rotate -</button>
        <input type="checkbox" id="renderData" name="renderData" checked="true">
  		  <label for="renderData">Render Data Preview</label>
        <button type="button" onclick="exportToObj()">Export Obj</button>
        <button type="button" onclick="RenderThumbnail()">Render Thumbnail</button>
      </div>

    </div>
    
    <script src="jquery.min.js"></script>
		<script src="three.min.js"></script>
		<script src="OrbitControls.js"></script>
		<script src="TrackballControls.js"></script>
		<script src="WebGL.js"></script>
    <script src="OBJExporter.js"></script>
    <script src="BufferGeometryUtils.js"></script>
    <script src="mesh_simplify.js"></script>
    <script src="OBJLoader.js"></script>
      
		<script id="template" type="notjs">
			<div class="scene"></div>
			<div class="description">$</div>
		</script>
    
		<script src="sketch.js"></script>

      
	

</body></html>
