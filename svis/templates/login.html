<!DOCTYPE html>
<html>
<head>
    <title>SculptingVis Login</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
</head>
<body>
<div class="w3-container w3-center" style="margin-top: 100px;">
    <div class="w3-card w3-padding" style="max-width: 400px; margin: auto;">
        <h2>SculptingVis Login</h2>
        <form method="post">
            {% csrf_token %}
            <div class="w3-margin-bottom">
                <input class="w3-input w3-border" type="text" name="username" placeholder="Username" required>
            </div>
            <div class="w3-margin-bottom">
                <input class="w3-input w3-border" type="password" name="password" placeholder="Password" required>
            </div>
            {% if form.errors %}
                <p style="color:red;">Invalid username or password.</p>
            {% endif %}
            <button class="w3-button w3-dark-grey w3-block" type="submit">Login</button>
        </form>
    </div>
</div>
</body>
</html>
