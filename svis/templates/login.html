{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>SculptingVis Login</title>
    <link rel="stylesheet" href="{% static 'w3.css' %}">
    <link rel="stylesheet" href="{% static 'svis.css' %}">
</head>
<body>
<div class="w3-container w3-center login-outer">
    <div class="w3-card w3-padding login-card">
        <h2>SculptingVis Login</h2>
        <form method="post">
            {% csrf_token %}
            <div class="w3-margin-bottom">
                <input class="w3-input w3-border" type="text" name="username" placeholder="Username" required>
            </div>
            <div class="w3-margin-bottom">
                <input class="w3-input w3-border" type="password" name="password" placeholder="Password" required>
            </div>
            {% if form.errors %}
                <p class="login-error">Invalid username or password.</p>
            {% endif %}
            <button class="w3-button w3-dark-grey w3-block" type="submit">Login</button>
        </form>
    </div>
</div>
</body>
</html>
