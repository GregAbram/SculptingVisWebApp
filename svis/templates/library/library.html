{% load static %}
<!DOCTYPE html>
<html lang="en">

<title>ScultptingVis Library</title>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>

{% csrf_token %}

<script type="text/javascript">
  
  var selections = [];

  var RenderSelections = function()
  {
    if (selections.length > 0)
    {
      $("#cselection").prop('disabled', false);
      $("#dselection").prop('disabled', false);
      $("#rselection").prop('disabled', false);
    }
    else
    {
      $("#cselection").prop('disabled', true);
      $("#dselection").prop('disabled', true);
      $("#rselection").prop('disabled', true);
    }

    let table = document.createElement('table');
    let b = document.createElement('tbody');
    table.appendChild(b);

    selections.forEach(function (uuid) {

      let r = document.createElement('tr');
      b.appendChild(r);

      let d = document.createElement('td');
      r.appendChild(d);

      console.log("XXXXXX ", uuid);
      if (uuid != 'none')
      {
        img = document.createElement('img');
        img.setAttribute('src', "{% static 'Artifacts/' %}" + uuid + '/thumbnail.png')
        img.setAttribute('alt', '(none)');
        img.setAttribute('onerror', 'this.onerror=null');
        img.setAttribute('width', '100');
      }

      d.appendChild(img);

      d = document.createElement('td');
      r.appendChild(d);

      inpt = document.createElement('input');
      inpt.setAttribute('type', 'button');
      inpt.setAttribute('value', 'Remove');
      inpt.setAttribute('onclick', 'RmSelection("' + uuid + '");');
      
      d.appendChild(inpt);
    
    });

    document.getElementById('selectionDiv').innerHTML = '';
    document.getElementById('selectionDiv').appendChild(table);
  }

  var hideArtifact = function(ev)
  {
    var uuid = ev.dataTransfer.getData("uuid");
    var url = '/library/hideArtifact/' + uuid;
    $.ajax({
     url: url,
       success: function(data) { ShowArtifacts(); },
       failure: function(data) { alert("failed"); }
    });
  }

  var downloadArtifact = function(ev)
  {
    a = document.createElement("a");
    a.href = '/library/downloadartifact/' + ev.dataTransfer.getData("uuid");
    a.setAttribute("download", "Will not be used");
    a.click();
  }

  var selectedArtifact = function(ev, uuid)
  {
  }

  var allowDropArtifact = function(ev)
  {
    ev.preventDefault();
  }

  var dropArtifact = function(ev)
  {
    ev.preventDefault();
    var uuid = ev.dataTransfer.getData("uuid");
    var host = ev.dataTransfer.getData("host");
    if (host != location.host)
    {
      var url = '/library/pullFromRemoteLibrary/' + host + '/' + uuid;
      $.ajax({
       url: url,
         success: function(data) { ShowArtifacts(); },
         failure: function(data) { alert("failed"); }
      });
    }
  }

  var exportArtifact = function(ev)
  {
    if (document.getElementById('dropDir').value == '(required)' || document.getElementById('dropName').value == 'required')
      alert("got to give me a destination directoty and name");
    else
    {
      ev.preventDefault();
      var uuid = ev.dataTransfer.getData('uuid');
      var destination = document.getElementById('dropDir').value + '/' + document.getElementById('dropName').value;
      var url = '/library/copyArtifactLocal/' + destination + '/' + uuid;
      $.ajax({
         url: url,
         success: function(data) { document.getElementById('dropName').value = '(required)'; },
         failure: function(data) { alert("failed"); }
      });
    }
  }

  var sendArtifact = function(event, uuid)
  {
    event.dataTransfer.setData("uuid", uuid);
    event.dataTransfer.setData("host", location.host);

    let dataForIframe = {
      'uuid': uuid,
      'host': location.host,
    };

    window.parent.postMessage(JSON.stringify(dataForIframe), 'http://localhost:8000');
  }

  var csrftoken = jQuery("[name=csrfmiddlewaretoken]").val();
  var artifact_type = 'glyph';

  var ShowFamily = function(i)  {
    $.get('/library/showtypefamily/' + artifact_type + '/' + i, "", function(data){  $('div[name="grid"]').html(data); }, "html");
  };

  var ShowClass = function(i)  {
    $.get('/library/showtypeclass/' + artifact_type + '/' + i, "", function(data){  $('div[name="grid"]').html(data); }, "html");
  };

  var ShowArtifacts = function() {
    $.get('/library/showtype/' + artifact_type, "", 
	function(data) {  
		g = $('div[name="grid"]')
		g.html(data);
	}, "html");
  }

  var lastType;

  var ShowType = function(me)  {
    if (lastType)
	lastType.style.backgroundColor = "#A1998F"
    lastType = me;
    me.style.backgroundColor = "lightgrey";

    artifact_type = me.innerText;
    ShowArtifacts();
  }

  $(document).ready(function()
  {
    ShowType(document.getElementById("glyphs_menu_item"));
  });

</script>

<title>W3.CSS Template</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://necolas.github.io/normalize.css/8.0.1/normalize.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>

h1,h2,h3,h4,h5,h6 {font-family: "Lato", sans-serif}
.w3-bar,h1,button {font-family: "Montserrat", sans-serif}

.fa-anchor,.fa-coffee {font-size:200px}

html {
    background-color: #A1998F;
}

div table tbody tr td {
    background-color: #A1998F;
}

body {
    background-color: #A1998F;
    height: 100%;
}

#exportZone {
  text-align: center;
  vertical-align: middle;
  height: 100%;
  width: 100%;
}

.download {
  position: absolute;
  z-index: 1;
  bottom: 0;
  left: 0;
}

.trash {
  position: absolute;
  z-index: 1;
  bottom: 0;
  right: 0;
}

titlebar {
  display: grid;
  padding-top: 10px;
  grid-template-columns:  1fr 1fr;
  width: 100%;
  border-bottom: 1px solid black;
}

pagename {
  grid-column: 1;
  font-size: xx-large;
}

options {
  grid-column: 2;
  display: grid;
  justify-self: right;
{% if islocal == True %}
  grid-template-columns: repeat(5, 1fr);
{% else %}
  grid-template-columns: repeat(4, 1fr);
{% endif %}
}

option {
  text-transform: uppercase;
  justify-self: center;
  align-self: end;
  margin-bottom: 3px;
  padding-top: 3px;
}

</style>

<body>
  <titlebar>
    <pagename>
      SculptingVis Artifact Library
    </pagename>
    <options>
      <option id=glyphs_menu_item onClick="ShowType(this);">glyph</option>
      <option id=colormaps_menu_item onClick="ShowType(this);">colormap</option>
      <option id=textures_menu_item onClick="ShowType(this);">texture</option>
      <option id=lines_menu_item onClick="ShowType(this);">line</option>
{% if islocal == True %}
      <div id=exportZone ondrop="exportArtifact(event)" ondragover="allowDropArtifact(event)"><small>
	<div>Export Zone</div>
	<table style='width: 100%'>
	  <tr>
	    <td>directory:</td>
	    <td><input id='dropDir' type='text' value='(required)'></td>
	  </tr><tr>
	    <td>name:</td>
	    <td><input id='dropName' type='text' value='(required)'></td>
	  </tr>
	</table>
      </div>
{% endif %}
    </options>
  </titlebar>

<div name='grid' style="height: 100%; overflow: auto;" ondrop="dropArtifact(event)" ondragover="allowDropArtifact(event)"></div>

<div class=download ondrop="downloadArtifact(event)" ondragover="allowDropArtifact(event)">
  <img src="{% static "download.png" %}" alt="trash" height="75" width="75">
</div>

<div class=trash ondrop="hideArtifact(event)" ondragover="allowDropArtifact(event)">
  <img src="{% static "trash.png" %}" alt="download" height="75" width="75">
</div>

</body>
</html>
