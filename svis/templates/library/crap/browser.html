<script>
  var ShowArtifacts = function(t)  {
      $.get('/library/showtype/' + t, "", function(data){  $('div[name="content"]').html(data); }, "html");
    };

    var ShowFamily = function(t,i)  {
      $.get('/library/showtypefamily/' + t + '/' + i, "", function(data){  $('div[name="content"]').html(data); }, "html");
    };

    var ShowClass = function(t,i)  {
      $.get('/library/showtypeclass/' + t + '/' + i, "", function(data){  $('div[name="content"]').html(data); }, "html");
    };

    var AddSelection = function(name) {
      $.get('/library/addselection/' + name, "", function(data){  $('div[name="selections"]').html(data); }, "html");
    }

    var RmSelection = function(name) {
      $.get('/library/rmselection/' + name, "", function(data){  $('div[name="selections"]').html(data); }, "html");
    }

    var ClearSelections = function() {
      $.get('/library/clearselections', "", function(data){  $('div[name="selections"]').html(data); }, "html");
    }

    var DownloadSelection = function() {
      const a = document.createElement('a');
      document.body.appendChild(a);
      a.href = "/library/downloadselection/"
      a.click();
      $('div[name="selections"]').html("");
    }
</script>
