{% load static %}
{% csrf_token %}

<!DOCTYPE html>
<html>
  <title>Artifact Scale Builder</title>
  <head>
    <link href="{% static 'vendor/jquery-ui-1.10.4/jquery-ui.css' %}" rel="stylesheet">
    <script src="{% static 'jquery-3.7.1.min.js' %}"></script>
    <script src="{% static 'vendor/jquery-ui-1.10.4/jquery-ui.js' %}"></script>
    <base href="/">
    <link rel="stylesheet" type="text/css" href="{% static 'scale-builder/style.css' %}">

    <script>
      var csrftoken = jQuery("[name=csrfmiddlewaretoken]").val();
    </script>

    <meta charset="utf-8">
  </head>
  <body>

    <dialog id=UploadDialog>
      <form id="upload_form">
        <table>
          {{ uploadForm }}
        </table>
        <input type="button" onclick='upload(event)' value="Upload">
        <input type=button onclick="(function() { document.getElementById('UploadDialog').open = false;})()" value="Close">
      </form>
      <iframe name=xrsp height=32></iframe>
    </dialog>


    <script src="{% static 'scale-builder/sketch.js' %}"></script>
    <div id="scaletypediv">
      <input type="radio" id="discrete" name="scale-type" value="discrete" checked>
      <label for="discrete">Discrete Scale (i.e., pick the closest artifact to the data value, like a binned color map)</label><br>
      <input type="radio" id="continuous" name="scale-type" value="continuous">
      <label for="continuous">Continuous Scale (i.e., use artifacts as control points and morph beteen them)</label><br>
    </div>
    <input id="distrib-btn" type="button" onclick='distributeEvenly(event)' value='Distribute Evenly'>
    <input id="save-btn" type="button" onclick='save(event)' value='Save to Library'>


  </body>
</html>
