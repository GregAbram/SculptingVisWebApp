{% load static %}
{% csrf_token %}

<!DOCTYPE html>
<html>
  <title>Color Looper</title>
  <head>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.10.2/p5.js"></script>

    <base href="/">
    <link rel="stylesheet" type="text/css" href="{% static 'color-loom/style.css' %}">

    <script>
      var csrftoken = jQuery("[name=csrfmiddlewaretoken]").val();
    </script>

    <meta charset="utf-8">
  </head>
  <body>

    <dialog id=UploadDialog>
      <form id="upload_form">
        <table>
          {{ uploadForm }}
        </table>
        <input type="button" onclick='upload(event)' value="Upload">
        <input type=button onclick="(function() { document.getElementById('UploadDialog').open = false;})()" value="Close">
      </form>
      <iframe name=xrsp height=32></iframe>
    </dialog>

    <script src="{% static 'color-loom/sketch.js' %}"></script>    

  </body>
</html>
